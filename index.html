<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sicherheits-Zähler: Compliance-Vorfall</title>
    <style>
        :root {
            --hazard-yellow: #ffcc00;
            --hazard-black: #1a1a1a;
            --danger-red: #d32f2f;
        }

        body {
            background-color: #2b2b2b;
            font-family: 'Arial Black', 'Arial', sans-serif;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Industrie-Warnbalken oben und unten */
        .hazard-bar {
            height: 20px;
            background: repeating-linear-gradient(
                -45deg,
                var(--hazard-yellow),
                var(--hazard-yellow) 20px,
                var(--hazard-black) 20px,
                var(--hazard-black) 40px
            );
            width: 100%;
        }

        .sign-container {
            background-color: #f5f5f5;
            color: var(--hazard-black);
            border: 8px solid var(--hazard-black);
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 700px;
            text-align: center;
            overflow: hidden;
        }

        .header {
            background-color: var(--hazard-black);
            color: var(--hazard-yellow);
            padding: 15px;
            font-size: 1.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .content {
            padding: 40px 20px;
        }

        h1 {
            font-size: 2rem;
            margin: 0 0 30px 0;
            color: var(--hazard-black);
            line-height: 1.3;
        }

        .counter-box {
            background-color: var(--hazard-black);
            color: var(--hazard-yellow);
            font-size: 7rem;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            min-width: 250px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border: 4px solid #444;
        }

        .unit {
            font-size: 1.5rem;
            display: block;
            margin-top: 10px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .footer-text {
            font-size: 1.1rem;
            margin-top: 30px;
            font-weight: bold;
            color: #555;
            text-transform: uppercase;
        }

        /* Reset Button Bereich */
        .admin-section {
            margin-top: 20px;
            padding: 15px;
            background-color: #e0e0e0;
            border-top: 2px dashed #999;
        }

        .btn-reset {
            background-color: var(--danger-red);
            color: white;
            border: 2px solid #a00;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .btn-reset:hover {
            background-color: #b71c1c;
        }

        .last-date {
            font-size: 0.85rem;
            color: #777;
            margin-top: 10px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div class="sign-container">
        <div class="hazard-bar"></div>
        <div class="header">EU AML TP DBD</div>
        
        <div class="content">
            <h1>WIR SIND SEIT</h1>
            
            <div class="counter-box">
                <span id="days-count">00</span>
                <span class="unit">TAGEN</span>
            </div>
            
            <div class="footer-text">
                <br>
                <span style="color: var(--danger-red); font-size: 1.3rem;">
                    OHNE DASS COMPLIANCE DIE DATENFELDANFORDERUNGEN GEÄNDERT HAT!
                </span>
            </div>
        </div>

        <div class="admin-section">
            <button class="btn-reset" onclick="resetCounter()">Neue Anforderung melden (Reset)</button>
            <div class="last-date" id="last-incident-date">Letzter Vorfall am: --.--.----</div>
        </div>
        
        <div class="hazard-bar"></div>
    </div>

    <script>
        // HIER DAS PASSWORT ÄNDERN
        const RESET_PASSWORD = "admin"; 

        // Initialisierung des Datums (beim allerersten Aufruf wird das aktuelle Datum gesetzt)
        if (!localStorage.getItem('lastComplianceIncident')) {
            // Setzt standardmäßig ein Startdatum (heute), falls keins existiert
            localStorage.setItem('lastComplianceIncident', new Date().toISOString());
        }

        function updateCounter() {
            const lastIncidentStr = localStorage.getItem('lastComplianceIncident');
            const lastIncident = new Date(lastIncidentStr);
            const now = new Date();
            
            // Berechnung der Differenz in vollen Tagen
            const diffTime = Math.abs(now - lastIncident);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            // Führende Null hinzufügen bei einstelligen Zahlen
            document.getElementById('days-count').innerText = diffDays < 10 ? '0' + diffDays : diffDays;
            
            // Datum des letzten Vorfalls anzeigen
            const options = { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' };
            document.getElementById('last-incident-date').innerText = "Letzter Vorfall dokumentiert am: " + lastIncident.toLocaleDateString('de-DE', options) + " Uhr";
        }

        function resetCounter() {
            const password = prompt("Bitte Passwort eingeben, um den Zähler auf 0 zurückzusetzen:");
            
            if (password === RESET_PASSWORD) {
                const confirmReset = confirm("Sicher? Hat Compliance wirklich wieder die Felder geändert?");
                if (confirmReset) {
                    localStorage.setItem('lastComplianceIncident', new Date().toISOString());
                    updateCounter();
                    alert("Zähler wurde auf 0 zurückgesetzt. Möge die Macht mit der IT sein.");
                }
            } else if (password !== null) {
                alert("Falsches Passwort! Der Zähler läuft unbeeindruckt weiter.");
            }
        }

        // Zähler beim Laden der Seite direkt berechnen
        updateCounter();
        
        // Jede Stunde im Hintergrund aktualisieren, falls die Seite offen bleibt
        setInterval(updateCounter, 3600000);
    </script>
</body>
</html>
